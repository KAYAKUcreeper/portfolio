<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Your Name</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="sao-bg-canvas"></canvas>
    
    <!-- SAO Header -->
    <header id="sao-header" class="hidden">
        <nav>
            <div class="sao-logo">PORTFOLIO</div>
            <ul class="sao-nav-links">
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="skills.html">SKILLS</a></li>
                <li><a href="projects.html">PROJECTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <!-- SAO UI Wrapper -->
    <div id="sao-ui-wrapper">
        <button id="sao-start-btn" class="sao-btn">MENU</button>
        
        <div id="sao-main-menu" class="hidden">
            <div class="sao-menu-container">
                <!-- Persistent Player Icon (Far Left) -->
                <div class="player-column persistent">
                    <div class="sao-icon-container">
                        <img id="player-avatar" src="" alt="" class="player-icon-img">
                    </div>
                </div>

                <!-- Main Menu Category Area -->
                <div class="menu-rows-container">
                    <!-- Row 1: Person -->
                    <div class="menu-row">
                        <button class="sao-cat-btn active" data-target="cat-player">👤</button>
                        <div id="cat-player" class="sub-menu active">
                            <a href="about.html" class="sao-section-btn">About</a>
                        </div>
                    </div>
                    
                    <!-- Row 2: Swords -->
                    <div class="menu-row">
                        <button class="sao-cat-btn" data-target="cat-swords">⚔️</button>
                        <div id="cat-swords" class="sub-menu">
                            <a href="skills.html" class="sao-section-btn">Skills</a>
                            <a href="projects.html" class="sao-section-btn">Projects</a>
                        </div>
                    </div>
                    
                    <!-- Row 3: Chat -->
                    <div class="menu-row">
                        <button class="sao-cat-btn" data-target="cat-chat">💬</button>
                        <div id="cat-chat" class="sub-menu">
                            <a href="contact.html" class="sao-section-btn">Contact</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
